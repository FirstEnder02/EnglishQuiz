<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz — Quiz</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">English<em>Quiz</em></a>
</nav>

<div class="page-wrapper">
  <div class="breadcrumb">
    <a th:href="@{/}">Categories</a>
    <span class="bc-sep">›</span>
    <span>Quiz</span>
  </div>

  <div class="quiz-wrapper">

    <!-- Left sidebar -->
    <aside class="quiz-sidebar">
      <div>
        <div class="sidebar-label">Score</div>
        <div class="score-chip" style="margin-top:10px">
          <div class="sc-val"><span id="score-val">0</span></div>
          <div class="sc-sub">answered of <span id="score-tot">0</span></div>
        </div>
      </div>

      <div>
        <div class="sidebar-label" style="margin-bottom:10px">Progress</div>
        <div class="dots-grid" id="progress-dots"></div>
      </div>

      <a class="btn btn-ghost btn-sm" th:href="@{'/category/' + ${levelId}}" style="margin-top:4px">
        ← Exit Quiz
      </a>
    </aside>

    <!-- Right question panel -->
    <main id="question-panel" class="question-panel">
      <p style="color:var(--text-muted); font-weight:700">Loading questions…</p>
    </main>

  </div>
</div>

<script th:inline="javascript">
  window.QUIZ_QUESTIONS = /*[[${questionsJson}]]*/ [];
  window.QUIZ_LEVEL_ID  = /*[[${levelId}]]*/ 0;
</script>
<script th:src="@{/js/quiz.js}"></script>

</body>
</html>
