<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz - Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container py-4">
    <header class="d-flex justify-content-between align-items-center mb-4">
      <h2>Quiz</h2>
      <a class="btn btn-outline-secondary" th:href="@{/}">Home</a>
    </header>

    <form th:action="@{/result}" method="post" class="card p-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div th:if="${#lists.isEmpty(questions)}" class="alert alert-warning">
        No questions available for this level.
      </div>

      <div th:each="q, qStat : ${questions}" class="mb-4">
        <p class="fw-bold mb-2">
          <span th:text="${qStat.index + 1}">1</span>. <span th:text="${q.title}">Question title</span>
        </p>

        <div class="list-group">
          <label class="list-group-item" th:each="a : ${q.answers}">
            <input class="form-check-input me-2" type="radio"
                   th:name="${'q' + q.id}"
                   th:value="${a.id}"
                   required/>
            <span th:text="${a.text}">Answer text</span>
          </label>
        </div>
      </div>

      <div class="d-flex justify-content-between">
        <a class="btn btn-outline-secondary" th:href="@{/levels/{catId}(catId=${categoryId})}">Back</a>
        <button type="submit" class="btn btn-success">Submit Answers</button>
      </div>
    </form>
  </div>
</body>
</html>
