<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{_layout :: head('Categories')}"></head>
<body>

<nav th:replace="~{_layout :: navbar}"></nav>

<div class="page-wrapper">
  <section class="hero">
    <h1 class="page-title">Choose a Category</h1>
    <p class="page-sub">Pick a topic to start your English practice. Each category contains multiple levels so you can improve step by step.</p>
    <div class="hero-meta">
      <span class="pill" th:text="|${#lists.size(categories)} ${#lists.size(categories) == 1 ? 'category' : 'categories'} available|">0 categories available</span>
    </div>
  </section>

  <div th:if="${#lists.isEmpty(categories)}" class="empty-box">
    <h3>No categories yet</h3>
    <p>Add categories to the database to get started.</p>
    <a th:href="@{/demo}" class="btn btn-primary" style="margin-top: 1rem;">View Demo</a>
  </div>

  <div class="card-grid" th:unless="${#lists.isEmpty(categories)}">
    <a class="cat-card" th:each="cat, iterStat : ${categories}"
       th:href="@{'/category/' + ${cat.id}}"
       th:attr="data-category-id=${cat.id}">
      <div class="cat-title" th:text="${cat.title}">Category</div>
      <div class="cat-arrow">Start quiz →</div>
    </a>
  </div>
</div>

</body>
</html>
