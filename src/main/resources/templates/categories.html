<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz - Categories</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(37, 99, 235, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at 20% 10%, #e8eeff, #f8f9ff 40%, #f5f7ff 70%);
      color: var(--text);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .navbar-brand {
      text-decoration: none;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 800;
    }

    .navbar-brand em {
      color: var(--primary);
      font-style: normal;
    }

    .page-wrapper {
      max-width: 1080px;
      margin: 28px auto;
      padding: 0 18px 34px;
    }

    .hero {
      background: linear-gradient(120deg, #ffffff, #edf2ff);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 26px 24px;
      margin-bottom: 22px;
      display: grid;
      gap: 14px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.5rem, 2.5vw, 2.1rem);
    }

    .page-sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
    }

    .search-wrap input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .empty-box {
      border: 1px dashed #c7d2fe;
      background: #ffffff;
      border-radius: var(--radius);
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .cat-card {
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: grid;
      gap: 8px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.04);
    }

    .cat-card:hover {
      transform: translateY(-3px);
      border-color: #bfdbfe;
      box-shadow: var(--shadow);
    }

    .cat-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #eff6ff;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
    }

    .cat-title {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
      min-height: 2.4em;
    }

    .cat-arrow {
      color: var(--primary);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">English<em>Quiz</em></a>
</nav>

<div class="page-wrapper">
  <section class="hero">
    <h1 class="page-title">Choose a Category</h1>
    <p class="page-sub">Pick a topic to start your English practice. Each category contains multiple levels so you can improve step by step.</p>
    <div class="hero-meta">
      <span class="pill" th:text="${#lists.size(categories)} + ' categories available'">0 categories available</span>
    </div>
    <div class="search-wrap" th:if="${!#lists.isEmpty(categories)}">
      <input id="categorySearch" type="text" placeholder="Search categories..."/>
    </div>
  </section>

  <div th:if="${#lists.isEmpty(categories)}" class="empty-box">
    <div class="eico">📂</div>
    <h3>No categories yet</h3>
    <p>Add categories to the database to get started.</p>
  </div>

  <div class="card-grid" id="categoryGrid" th:unless="${#lists.isEmpty(categories)}">
    <a class="cat-card" th:each="cat : ${categories}"
       th:href="@{'/category/' + ${cat.id}}"
       th:attr="data-title=${#strings.toLowerCase(cat.title)}">
      <div class="cat-icon">📚</div>
      <div class="cat-title" th:text="${cat.title}">Category</div>
      <div class="cat-arrow">Start quiz -></div>
    </a>
  </div>
</div>

<script>
  (() => {
    const input = document.getElementById("categorySearch");
    const grid = document.getElementById("categoryGrid");
    if (!input || !grid) return;

    const cards = Array.from(grid.querySelectorAll(".cat-card"));
    input.addEventListener("input", () => {
      const keyword = input.value.trim().toLowerCase();
      cards.forEach((card) => {
        const title = card.getAttribute("data-title") || "";
        card.classList.toggle("hidden", keyword.length > 0 && !title.includes(keyword));
      });
    });
  })();
</script>

</body>
</html>
