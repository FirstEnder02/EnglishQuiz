<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz — Result</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">English<em>Quiz</em></a>
</nav>

<div class="page-wrapper">
  <div class="breadcrumb">
    <a th:href="@{/}">Categories</a>
    <span class="bc-sep">›</span>
    <span>Result</span>
  </div>

  <div class="result-paper">

    <!-- Header with score -->
    <div class="result-header">
      <div class="score-ring">
        <span class="big" th:text="${score}">0</span>
        <span class="sub" th:text="'/ ' + ${total}">/ 0</span>
      </div>
      <h1 th:text="${score == total} ? 'Perfect Score! 🎉' :
                   (score >= total / 2 ? 'Good Job! 👍' : 'Keep Practising 💪')">Result</h1>
      <p class="sub-msg" th:text="${score} + ' correct out of ' + ${total} + ' questions'"></p>
    </div>

    <!-- Per-question breakdown -->
    <div class="result-body">

      <div class="r-item" th:each="item, iStat : ${result.items}">

        <!-- Question row -->
        <div class="r-q-row">
          <div th:class="${item.correct} ? 'r-num c' :
                          (item.chosenIds.isEmpty() ? 'r-num s' : 'r-num w')"
               th:text="${iStat.index + 1}">1</div>
          <p class="r-title" th:text="${item.question.title}">Question title</p>
        </div>

        <!-- Image -->
        <div class="r-image" th:if="${item.question.mediaUrl != null and !item.question.mediaUrl.isEmpty()}">
          <img th:src="${item.question.mediaUrl}" alt="Question image" loading="lazy"/>
        </div>

        <!-- Answers -->
        <div class="r-answers">
          <div th:each="ans : ${item.question.answers}">
            <div th:with="
                  wasChosen=${item.chosenIds.contains(ans.id)},
                  isCorrect=${ans.correct}">
              <div th:class="${isCorrect and wasChosen} ? 'r-ans ca' :
                              (wasChosen and !isCorrect) ? 'r-ans cw' :
                              (isCorrect and !wasChosen) ? 'r-ans ca' : 'r-ans neu'">
                <span class="al" th:text="${ans.label}">A</span>
                <span th:text="${ans.text}">Answer text</span>
                <span class="ai"
                      th:if="${isCorrect and wasChosen}">✓</span>
                <span class="ai"
                      th:if="${wasChosen and !isCorrect}">✗</span>
                <span class="ai"
                      th:if="${isCorrect and !wasChosen}">← correct</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Explanation -->
        <div class="r-exp"
             th:if="${item.question.explaination != null and !item.question.explaination.isEmpty()}">
          <strong>Explanation: </strong>
          <span th:text="${item.question.explaination}"></span>
        </div>

      </div>
    </div>

    <!-- Footer actions -->
    <div class="result-footer">
      <a class="btn btn-ghost" th:href="@{/}">← Back to Categories</a>
      <a class="btn btn-primary" th:href="@{/}">Try Another Quiz</a>
    </div>

  </div>
</div>

</body>
</html>
