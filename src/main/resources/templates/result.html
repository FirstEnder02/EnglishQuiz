<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{_layout :: head('Result')}"></head>
<body>

<nav th:replace="~{_layout :: navbar}"></nav>

<div class="page-wrapper">
  <div class="breadcrumb">
    <a th:href="@{/}">Categories</a>
    <span class="bc-sep">›</span>
    <span>Result</span>
  </div>

  <div class="result-paper">

    <!-- Header with score -->
    <div class="result-header">
      <div class="score-ring">
        <span class="big" th:text="${score}">0</span>
        <span class="sub" th:text="'/ ' + ${total}">/ 0</span>
      </div>
      <h1 th:if="${score == total}">Perfect Score!</h1>
      <h1 th:if="${score < total and score >= total / 2}">Good Job!</h1>
      <h1 th:if="${score < total / 2}">Keep Practising</h1>
      <p class="sub-msg">
        <span th:text="${score}">0</span> correct out of <span th:text="${total}">0</span> 
        <span th:text="${total == 1 ? 'question' : 'questions'}">questions</span>
        <span th:if="${score == total}"> - You aced it!</span>
      </p>
    </div>

    <!-- Per-question breakdown -->
    <div class="result-body">

      <div class="r-item" th:each="item, iStat : ${result.items}">

        <!-- Question row -->
        <div class="r-q-row">
          <div th:if="${item.correct}" class="r-num c" th:text="${iStat.index + 1}" th:title="'Correct'">1</div>
          <div th:if="${!item.correct and item.chosenIds.isEmpty()}" class="r-num s" th:text="${iStat.index + 1}" th:title="'Skipped'">1</div>
          <div th:if="${!item.correct and !item.chosenIds.isEmpty()}" class="r-num w" th:text="${iStat.index + 1}" th:title="'Wrong'">1</div>
          <p class="r-title" th:text="${item.question.title}">Question title</p>
        </div>

        <!-- Image -->
        <div class="r-image" th:if="${item.question.mediaUrl != null and !#strings.isEmpty(item.question.mediaUrl)}">
          <img th:src="${item.question.mediaUrl}" th:alt="'Image for question ' + ${iStat.index + 1}" loading="lazy"/>
        </div>

        <!-- Answers -->
        <div class="r-answers">
          <div th:each="ans : ${item.question.answers}">
            <div th:with="wasChosen=${item.chosenIds.contains(ans.id)}, isCorrect=${ans.isCorrect}">
              <div th:if="${isCorrect and wasChosen}" class="r-ans ca">
                <span class="al" th:text="${ans.label}">A</span>
                <span th:text="${ans.text}">Answer text</span>
                <span class="ai">Correct</span>
              </div>
              <div th:if="${wasChosen and !isCorrect}" class="r-ans cw">
                <span class="al" th:text="${ans.label}">A</span>
                <span th:text="${ans.text}">Answer text</span>
                <span class="ai">Wrong</span>
              </div>
              <div th:if="${isCorrect and !wasChosen}" class="r-ans ca">
                <span class="al" th:text="${ans.label}">A</span>
                <span th:text="${ans.text}">Answer text</span>
                <span class="ai">Correct answer</span>
              </div>
              <div th:if="${!isCorrect and !wasChosen}" class="r-ans neu">
                <span class="al" th:text="${ans.label}">A</span>
                <span th:text="${ans.text}">Answer text</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Explanation -->
        <div class="r-exp"
             th:if="${item.question.explaination != null and !#strings.isEmpty(item.question.explaination)}">
          <strong>Explanation:</strong>
          <span th:text="${item.question.explaination}"></span>
        </div>

      </div>
    </div>

    <!-- Footer actions -->
    <div class="result-footer">
      <form th:action="@{/quiz/reset}" method="post">
        <input type="hidden" name="categoryId" th:value="${categoryId}"/>
        <input type="hidden" name="levelId" th:value="${levelId}"/>
        <button type="submit" class="btn btn-primary">Reset & Retry This Quiz</button>
      </form>
      <a class="btn btn-ghost" th:href="@{/}">Back to Categories</a>
      <a class="btn btn-primary" th:href="@{/}">Try Another Quiz</a>
    </div>

  </div>
</div>

</body>
</html>
