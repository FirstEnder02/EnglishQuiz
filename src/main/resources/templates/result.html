<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz - Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container py-4">
    <div class="card p-4">
      <h2 class="mb-3">Quiz Submitted</h2>

      <div th:if="${score != null}">
        <p class="lead">Your score: <strong th:text="${score}">0/10</strong></p>
      </div>

      <div th:if="${score == null}">
        <p>Your answers were recorded.</p>
      </div>

      <div class="mt-3">
        <a class="btn btn-primary" th:href="@{/}">Back to Categories</a>
        <a class="btn btn-outline-secondary" th:href="@{/results}">View Detailed Results</a>
      </div>
    </div>
  </div>
</body>
</html>
