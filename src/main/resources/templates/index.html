<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz - Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" th:href="@{/}">English Quiz</a>
      <div class="ms-auto">
        <a class="btn btn-outline-primary" th:href="@{/logout}">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="mb-4">Select Category</h1>

    <div class="row row-cols-1 row-cols-md-3 g-3">
      <div class="col" th:each="cat : ${categories}">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title" th:text="${cat.title}">Category Title</h5>
            <p class="card-text" th:text="${cat.description}">Short description (optional)</p>
            <a class="btn btn-primary" th:href="@{'/levels/' + ${cat.id}}">Choose</a>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <a class="btn btn-link" th:href="@{/}">Back to Home</a>
    </div>
  </main>
</body>
</html>
