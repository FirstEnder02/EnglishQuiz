<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz - Levels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container py-4">
    <header class="d-flex justify-content-between align-items-center mb-4">
      <h2>Select Level</h2>
      <a class="btn btn-secondary" th:href="@{/}">Categories</a>
    </header>

    <div class="list-group">
      <a class="list-group-item list-group-item-action"
         th:each="level : ${levels}"
         th:href="@{'/quiz/' + ${level.id}}">
        <strong th:text="'Level ' + ${level.level}">Level 1</strong>
        <span class="text-muted ms-2" th:text="${level.description}">Description</span>
      </a>
    </div>
  </div>
</body>
</html>
