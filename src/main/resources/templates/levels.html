<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>English Quiz — Choose Level</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">English<em>Quiz</em></a>
</nav>

<div class="page-wrapper">
  <div class="breadcrumb">
    <a th:href="@{/}">Categories</a>
    <span class="bc-sep">›</span>
    <span>Select Level</span>
  </div>

  <h1 class="page-title">Choose a Level</h1>
  <p class="page-sub">Levels range from 1 (beginner) to 15 (advanced). Level 10+ is above average English skill.</p>

  <div th:if="${levels == null or #lists.isEmpty(levels)}" class="empty-box">
    <div class="eico">🎯</div>
    <h3>No levels yet</h3>
    <p>No levels have been added for this category.</p>
    <a class="btn btn-ghost" style="margin-top:16px" th:href="@{/}">← Back to Categories</a>
  </div>

  <div class="level-grid" th:if="${levels != null and !#lists.isEmpty(levels)}">
    <a class="level-badge" th:each="lv : ${levels}"
       th:href="@{'/quiz/' + ${lv.id}}">
      <span class="level-num" th:text="${lv.levelName}">1</span>
      <span class="level-lbl">Level</span>
    </a>
  </div>

  <div style="margin-top: 28px;">
    <a class="btn btn-ghost btn-sm" th:href="@{/}">← Back to Categories</a>
  </div>
</div>

</body>
</html>
